<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offchain Market - Live USDT TRC20 Tracker (>$10K)</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121214; color: #ffffff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00e676; border-bottom: 2px solid #29292e; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #1a1a1e; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #29292e; }
        th { background-color: #29292e; color: #00e676; }
        tr:hover { background-color: #232329; }
        .amount { font-weight: bold; color: #00e676; }
        .address { font-family: monospace; color: #b3b3b3; }
        .hash a { color: #4fc3f7; text-decoration: none; }
        .hash a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔴 Live USDT TRC20 Whale Transfers (Minimal $10,000)</h1>
    <p>Memantau transaksi besar di jaringan TRON secara live (offchain monitoring).</p>
    
    <table>
        <thead>
            <tr>
                <th>Waktu</th>
                <th>Jumlah (USDT)</th>
                <th>Pengirim (From)</th>
                <th>Penerima (To)</th>
                <th>TxID / Hash</th>
            </tr>
        </thead>
        <tbody id="tx-table-body">
            </tbody>
    </table>
</div>

<script>
    // Koneksikan ke backend Node.js menggunakan WebSocket
    const ws = new WebSocket('ws://localhost:3000');
    const tableBody = document.getElementById('tx-table-body');

    ws.onmessage = (event) => {
        const tx = JSON.parse(event.data);
        
        // Format waktu
        const date = new Date(tx.timestamp).toLocaleTimeString();

        // Buat baris baru di tabel
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${date}</td>
            <td class="amount">$${tx.amount.toLocaleString()} USDT</td>
            <td class="address">${tx.from.substring(0,6)}...${tx.from.substring(tx.from.length - 6)}</td>
            <td class="address">${tx.to.substring(0,6)}...${tx.to.substring(tx.to.length - 6)}</td>
            <td class="hash"><a href="https://tronscan.org/#/transaction/${tx.txHash}" target="_blank">Buka TronScan ↗</a></td>
        `;

        // Masukkan ke baris paling atas agar yang terbaru selalu terlihat pertama
        tableBody.insertBefore(row, tableBody.firstChild);

        // Batasi baris tabel maksimal 50 agar website tidak lag
        if (tableBody.children.length > 50) {
            tableBody.removeChild(tableBody.lastChild);
        }
    };

    ws.onclose = () => {
        console.log("Koneksi terputus ke server backend.");
    };
</script>
</body>
</html>
