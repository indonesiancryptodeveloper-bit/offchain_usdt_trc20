<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offchain Market - Live USDT TRC20 Tracker (>$10K)</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121214; color: #ffffff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00e676; border-bottom: 2px solid #29292e; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #1a1a1e; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #29292e; }
        th { background-color: #29292e; color: #00e676; }
        tr:hover { background-color: #232329; }
        .amount { font-weight: bold; color: #00e676; }
        .address { font-family: monospace; color: #b3b3b3; }
        .hash a { color: #4fc3f7; text-decoration: none; }
        .hash a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔴 Live USDT TRC20 Whale Transfers (Minimal $10,000)</h1>
    <p>Memantau transaksi besar di jaringan TRON secara live via client-side API.</p>
    
    <table>
        <thead>
            <tr>
                <th>Waktu</th>
                <th>Jumlah (USDT)</th>
                <th>Pengirim (From)</th>
                <th>Penerima (To)</th>
                <th>TxID / Hash</th>
            </tr>
        </thead>
        <tbody id="tx-table-body">
            </tbody>
    </table>
</div>

<script>
    const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
    const MIN_AMOUNT = 10000;
    let lastTimestamp = Date.now();
    const tableBody = document.getElementById('tx-table-body');

    async function fetchUSDTTransactions() {
        try {
            const url = `https://api.trongrid.io/v1/contracts/${USDT_CONTRACT}/events?event_name=Transfer&order_by=block_timestamp,asc&min_timestamp=${lastTimestamp}`;
            const response = await fetch(url);
            const resData = await response.json();
            
            if (resData && resData.data) {
                const transfers = resData.data;
                
                transfers.forEach(tx => {
                    const rawValue = tx.result.value || tx.result.amount;
                    const amountClean = parseFloat(rawValue) / 1000000;
                    
                    if (amountClean >= MIN_AMOUNT) {
                        const date = new Date(tx.block_timestamp).toLocaleTimeString();
                        
                        // Cek apakah TxID sudah ada di tabel agar tidak duplikat
                        if (!document.getElementById(tx.transaction_id)) {
                            const row = document.createElement('tr');
                            row.id = tx.transaction_id;
                            row.innerHTML = `
                                <td>${date}</td>
                                <td class="amount">$${amountClean.toLocaleString()} USDT</td>
                                <td class="address">${tx.result.from.substring(0,6)}...${tx.result.from.substring(tx.result.from.length - 6)}</td>
                                <td class="address">${tx.result.to.substring(0,6)}...${tx.result.to.substring(tx.result.to.length - 6)}</td>
                                <td class="hash"><a href="https://tronscan.org/#/transaction/${tx.transaction_id}" target="_blank">Buka TronScan ↗</a></td>
                            `;
                            tableBody.insertBefore(row, tableBody.firstChild);
                        }
                    }
                    
                    if (tx.block_timestamp >= lastTimestamp) {
                        lastTimestamp = tx.block_timestamp + 1;
                    }
                });

                while (tableBody.children.length > 50) {
                    tableBody.removeChild(tableBody.lastChild);
                }
            }
        } catch (error) {
            console.error("Gagal memuat data blockchain:", error);
        }
    }

    // Jalankan pooling langsung dari browser setiap 5 detik
    setInterval(fetchUSDTTransactions, 5000);
    fetchUSDTTransactions(); // Panggilan awal saat web dimuat
</script>
</body>
</html>
